<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AMOR — Cadastro</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display+SC:wght@400;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body class="pagina-cadastro">

  <div class="topo"></div>

  <header>
    <div class="logo"><img src="logo-corvo.png" alt="Logo Amor"></div>
    <nav>
      <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="roupas.html">Roupas</a></li>
        <li><a href="sobre.html">Sobre Nós</a></li>
        <li><a href="contact.html">Contato</a></li>
        <li><a href="cadastro.html">Cadastro</a></li>
      </ul>
    </nav>
    <div class="topo-dir">
      <input type="text" class="busca" placeholder="Buscar">
      <a href="carrinho.html" class="carrinho">🛒</a>
    </div>
  </header>

  <div class="fundo"></div>

  <div class="centro-cadastro">
    <div class="cartao">
      <div class="logo">
        <img src="amor.png" alt="Amor">
      </div>

    <form>
      <label for="nome">Nome Completo</label>
      <input class="input" type="text" id="nome" name="nome" placeholder="">

      <label for="sobrenome">Sobrenome</label>
      <input class="input" type="text" id="sobrenome" name="sobrenome" placeholder="">

      <label>Numero</label>
      <div class="linha-numero">
        <input class="input ddd" type="text" name="ddd" placeholder="DDD">
        <input class="input num" type="text" name="numero" placeholder="Número">
      </div>

      <label for="email">Email</label>
      <input class="input" type="email" id="email" name="email" placeholder="">

      <label for="cpf">CPF</label>
      <input class="input" type="text" id="cpf" name="cpf" placeholder="">

      <div class="checkbox-lista">
        <label class="item-check">
          <input type="checkbox" name="termos">
          Aceito os <a href="#">Termos de serviços</a>
        </label>
        <label class="item-check">
          <input type="checkbox" name="contrato">
          Aceito o <a href="#">Contrato de serviços</a>
        </label>
      </div>

      <button type="submit" class="btn-cadastro">CADASTRA-SE</button>
    </form>
    </div>
  </div>

</body>
</html>
